# Render Blueprint — https://render.com/docs/yaml-spec
#
# Create a Redis instance in the dashboard (or use Upstash) and set REDIS_URL on both services.
# Build context must be repo root (monorepo: backend/, ski/, data/, features/, transformations/).

services:
  - type: web
    name: ski-ai
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
